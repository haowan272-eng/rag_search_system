services:
  migrate:
    build: .
    image: rag_ai-backend:prod
    command: uv run --frozen --no-dev alembic upgrade head
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://${POSTGRES_USER:-rag_user}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rag_db}}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_JSON=${LOG_JSON:-true}
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build: .
    image: rag_ai-backend:prod
    container_name: rag_ai-backend
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://${POSTGRES_USER:-rag_user}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rag_db}}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_DIM=1024
      - REDIS_URL=redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD}@redis:6379/2
      - APP_ENV=production
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_JSON=${LOG_JSON:-true}
      - PORT=8001
      - SECRET_KEY=${SECRET_KEY}
      - REFRESH_SECRET_KEY=${REFRESH_SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - RAG_ANSWER_TIMEOUT_SECONDS=${RAG_ANSWER_TIMEOUT_SECONDS:-60}
      - MODEL_ROOT=/app/models
    volumes:
      - uploads_data:/app/uploads
      - ${MODEL_ROOT:?set MODEL_ROOT}:/app/models:ro
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy

  worker:
    build: .
    image: rag_ai-backend:prod
    command: uv run --frozen --no-dev celery -A app.core.celery:celery_app worker --loglevel=INFO --queues=document_index --concurrency=${CELERY_WORKER_CONCURRENCY:-1}
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://${POSTGRES_USER:-rag_user}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rag_db}}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_DIM=1024
      - REDIS_URL=redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD}@redis:6379/2
      - CELERY_VISIBILITY_TIMEOUT_SECONDS=${CELERY_VISIBILITY_TIMEOUT_SECONDS:-3600}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_JSON=${LOG_JSON:-true}
      - VISION_MODEL=${VISION_MODEL:-}
      - VISION_BASE_URL=${VISION_BASE_URL:-http://host.docker.internal:8001/v1}
      - VISION_API_KEY=${VISION_API_KEY:-EMPTY}
      - RAG_OCR_CONCURRENCY=${RAG_OCR_CONCURRENCY:-3}
      - RAG_VISION_CONCURRENCY=${RAG_VISION_CONCURRENCY:-2}
      - VISION_GLOBAL_CONCURRENCY=${VISION_GLOBAL_CONCURRENCY:-2}
      - RAG_DOCUMENT_TIMEOUT_SECONDS=${RAG_DOCUMENT_TIMEOUT_SECONDS:-1800}
      - MODEL_ROOT=/app/models
    volumes:
      - uploads_data:/app/uploads
      - ${MODEL_ROOT:?set MODEL_ROOT}:/app/models:ro
      - model_cache:/root/.cache/huggingface
    restart: always
    stop_grace_period: 30s
    deploy:
      replicas: ${RAG_WORKER_REPLICAS:-2}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    image: rag_ai-frontend:prod
    container_name: rag_ai-frontend
    ports:
      - "80:80"
    restart: always
    depends_on:
      backend:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: rag_ai-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-rag_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-rag_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  redis:
    image: redis:7-alpine
    container_name: rag_ai-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 256mb --maxmemory-policy noeviction --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD}
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?set REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  uploads_data:
  model_cache:
