name: Python CI

on:
  push:
    paths:
      - "app/**"
      - "tests/**"
      - "testpy/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/python-ci.yml"
  pull_request:
    paths:
      - "app/**"
      - "tests/**"
      - "testpy/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.18"
          enable-cache: true
      - name: Check lock file
        run: uv lock --check
      - name: Install locked dependencies
        run: uv sync --frozen --group dev
      - name: Run tests
        env:
          DATABASE_URL: sqlite://
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: uv run --frozen --group dev python -m pytest
      - name: Verify evaluation environment
        run: uv run --frozen --group evaluation python -c "import ragas; print(ragas.__version__)"
