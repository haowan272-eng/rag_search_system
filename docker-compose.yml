services:
  backend:
    build: .
    image: rag_ai-backend:1
    container_name: rag_ai-backend
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://rag_user:rag_password@postgres:5432/rag_db}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_DIM=1024
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - APP_ENV=${APP_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_JSON=${LOG_JSON:-true}
      - PORT=8001
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - RAG_ANSWER_TIMEOUT_SECONDS=${RAG_ANSWER_TIMEOUT_SECONDS:-60}
      - MODEL_ROOT=${MODEL_ROOT:-/app/models}
    volumes:
      - uploads_data:/app/uploads
      - ${MODEL_ROOT:-~/models}:/app/models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy

  worker:
    build: .
    image: rag_ai-backend:1
    command: uv run --frozen --no-dev celery -A app.core.celery:celery_app worker --loglevel=INFO --queues=document_index --concurrency=${CELERY_WORKER_CONCURRENCY:-1}
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://rag_user:rag_password@postgres:5432/rag_db}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_DIM=1024
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CELERY_VISIBILITY_TIMEOUT_SECONDS=${CELERY_VISIBILITY_TIMEOUT_SECONDS:-3600}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_JSON=${LOG_JSON:-true}
      - VISION_MODEL=${VISION_MODEL:-}
      - VISION_BASE_URL=${VISION_BASE_URL:-http://host.docker.internal:8001/v1}
      - VISION_API_KEY=${VISION_API_KEY:-EMPTY}
      - RAG_OCR_CONCURRENCY=${RAG_OCR_CONCURRENCY:-3}
      - RAG_VISION_CONCURRENCY=${RAG_VISION_CONCURRENCY:-2}
      - VISION_GLOBAL_CONCURRENCY=${VISION_GLOBAL_CONCURRENCY:-2}
      - RAG_DOCUMENT_TIMEOUT_SECONDS=${RAG_DOCUMENT_TIMEOUT_SECONDS:-1800}
      - MODEL_ROOT=${MODEL_ROOT:-/app/models}
    volumes:
      - uploads_data:/app/uploads
      - ${MODEL_ROOT:-~/models}:/app/models:ro
    restart: unless-stopped
    stop_grace_period: 30s
    deploy:
      replicas: ${RAG_WORKER_REPLICAS:-1}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    image: rag_ai-frontend:1
    container_name: rag_ai-frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: rag_ai-postgres
    ports:
      - "15432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-rag_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rag_password}
      - POSTGRES_DB=${POSTGRES_DB:-rag_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rag_ai-redis
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 256mb --maxmemory-policy noeviction
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  uploads_data:

